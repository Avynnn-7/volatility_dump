name: Volatility Arbitrage CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release, Debug]
        include:
          - os: ubuntu-latest
            cmake_generator: "Unix Makefiles"
          - os: windows-latest
            cmake_generator: "Visual Studio 17 2022"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup vcpkg (Windows)
      if: runner.os == 'Windows'
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg integrate install

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libeigen3-dev nlohmann-json3-dev

    - name: Install dependencies (Windows vcpkg)
      if: runner.os == 'Windows'
      run: |
        .\vcpkg\vcpkg install eigen3:x64-windows
        .\vcpkg\vcpkg install nlohmann-json:x64-windows
        .\vcpkg\vcpkg install osqp:x64-windows

    - name: Configure CMake (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: |
        cmake -B build -G "${{ matrix.cmake_generator }}" -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }} --parallel

    - name: Run tests
      run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure --timeout 300

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.build_type }}
        path: |
          build/Testing/
          build/**/*.log

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck clang-tidy cmake libeigen3-dev nlohmann-json3-dev

    - name: Run cppcheck
      run: |
        cppcheck --enable=all --error-exitcode=0 --suppress=missingIncludeSystem \
                 --suppress=unusedFunction --suppress=unmatchedSuppression \
                 -I include/ src/ 2>&1 | tee cppcheck-report.txt
      continue-on-error: true

    - name: Configure for clang-tidy
      run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Run clang-tidy
      run: |
        find src -name '*.cpp' -exec clang-tidy {} -p build \; 2>&1 | tee clang-tidy-report.txt
      continue-on-error: true

    - name: Upload analysis reports
      uses: actions/upload-artifact@v4
      with:
        name: static-analysis-reports
        path: |
          cppcheck-report.txt
          clang-tidy-report.txt
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libeigen3-dev nlohmann-json3-dev

    - name: Configure CMake (Release)
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release --parallel

    - name: Run benchmarks
      run: |
        if [ -f build/vol_benchmark ]; then
          ./build/vol_benchmark --output=benchmark-results.json
        else
          echo "Benchmark executable not found, skipping"
        fi
      continue-on-error: true

    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark-results.json

  documentation:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Doxygen
      run: sudo apt-get install -y doxygen graphviz

    - name: Generate documentation
      run: |
        if [ -f Doxyfile ]; then
          doxygen Doxyfile
        else
          echo "No Doxyfile found, skipping documentation generation"
        fi
      continue-on-error: true

    - name: Upload documentation
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/html/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-and-test, static-analysis]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Release
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Create Release Archive
      run: |
        mkdir -p release
        cp build/vol_arb release/ 2>/dev/null || true
        cp build/api_server release/ 2>/dev/null || true
        cp build/vol_benchmark release/ 2>/dev/null || true
        cp -r include release/
        cp README.md release/ 2>/dev/null || true
        cp LICENSE release/ 2>/dev/null || true
        tar -czvf volatility-arbitrage-${{ github.ref_name }}.tar.gz release/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: volatility-arbitrage-${{ github.ref_name }}.tar.gz
        generate_release_notes: true
